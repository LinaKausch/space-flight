<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starflight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <canvas id="scene"></canvas>

    <div class="hud">
        <span class="title">Starflight</span>
        <span id="speedReadout">Speed 1.00x</span>
        <button id="resetBtn" type="button">Reset Camera</button>
    </div>

    <div class="hint">Autopilot wandering enabled | Reset camera to change route</div>

    <script src="app.js"></script>
</body>

</html>
